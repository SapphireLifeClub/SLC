<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Life</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #f2ede8;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(38px, 6vw, 72px);
    letter-spacing: 0.22em;
    color: #1c2b4a;
    text-transform: uppercase;
  }

  .sub {
    margin-top: 10px;
    font-family: 'Didact Gothic', sans-serif;
    font-size: clamp(8px, 1.2vw, 10px);
    letter-spacing: 0.45em;
    color: #8c8880;
    text-transform: uppercase;
    text-align: center;
  }

  .rule {
    width: 1px;
    height: 60px;
    background: #c8bfb0;
    margin: 48px auto;
  }

  .coming {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: 0.55em;
    color: #1c2b4a;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="wordmark">Sapphire Life</div>
  <div class="sub">Private Club &nbsp;·&nbsp; Newport Beach</div>

  <div class="rule"></div>

  <div class="coming">Coming Soon</div>

</body>
</html>
